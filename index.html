<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>Editor Demo</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    
    <script src="./editor.js"></script>
  </head>
  <body>
    <input type="text" placeholder="言語を入力..." value="js" id="lang" /><button type="button" id="apply">適応する</button>
    <com-editor lang="js" style="min-height: 300px; width: 75vw;" id="editor"></com-editor>
    <script>
      const input = document.getElementById('lang');
      const apply = document.getElementById('apply');
      const editor = document.getElementById('editor');
      apply.addEventListener('click', () => {
        editor.lang = input.value;
      });
    </script>
  </body>
</html>
